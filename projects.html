<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StackMates — Projets</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .project-card {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      cursor: pointer;
    }

    .project-card h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
    }

    .project-card .desc {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .project-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .project-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .project-footer .author {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .roles-needed {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .search-bar {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      align-items: center;
    }

    .search-bar input {
      flex: 1;
    }

    #btn-new-project {
      white-space: nowrap;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html" class="nav-logo">Stack<span>Mates</span></a>
  <ul class="nav-links">
    <li><a href="projects.html">Projets</a></li>
    <li><a href="messages.html">Messages</a></li>
    <li><a href="profile.html" class="active">Mon profil</a></li>
    <li><a href="#" id="btn-logout">Déconnexion</a></li>
  </ul>
</nav>

  <div class="container">
    <div class="page-header">
      <h1>Projets ouverts</h1>
      <p>Des devs cherchent leurs coéquipiers. Postule à ce qui t'intéresse.</p>
    </div>

    <div class="search-bar">
      <input type="text" id="search" placeholder="🔍  Rechercher un projet, une stack..." />
      <button class="btn btn-primary" id="btn-new-project" onclick="window.location.href='new-project.html'">+ Nouveau
        projet</button>
    </div>

    <div class="filters" id="stack-filters">
      <button class="filter-btn active" data-stack="all">Tous</button>
      <button class="filter-btn" data-stack="React">React</button>
      <button class="filter-btn" data-stack="Firebase">Firebase</button>
      <button class="filter-btn" data-stack="Python">Python</button>
      <button class="filter-btn" data-stack="Node.js">Node.js</button>
      <button class="filter-btn" data-stack="Flutter">Flutter</button>
      <button class="filter-btn" data-stack="Android">Android</button>
      <button class="filter-btn" data-stack="Vue">Vue</button>
    </div>

    <div class="filters" id="status-filters">
      <button class="filter-btn active" data-status="all">Tous statuts</button>
      <button class="filter-btn" data-status="open">🟢 Ouvert</button>
      <button class="filter-btn" data-status="inprogress">🟡 En cours</button>
      <button class="filter-btn" data-status="done">⚫ Terminé</button>
    </div>

    <div class="projects-grid" id="projects-grid">
      <div class="empty-state" style="grid-column:1/-1">
        <div class="icon">⏳</div>
        <h3>Chargement...</h3>
      </div>
    </div>
  </div>

  <!-- Modal détail projet -->
  <div class="modal-overlay" id="project-modal">
    <div class="modal" style="max-width:600px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">
        <div>
          <h2 id="modal-title">Titre</h2>
          <div id="modal-badges" style="display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.4rem"></div>
        </div>
        <button onclick="closeModal()"
          style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem">✕</button>
      </div>
      <p id="modal-desc" style="color:var(--muted);font-size:0.95rem;line-height:1.7;margin-bottom:1.2rem"></p>
      <div style="margin-bottom:1rem">
        <div
          style="font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem">
          Stack</div>
        <div id="modal-stack" style="display:flex;gap:0.4rem;flex-wrap:wrap"></div>
      </div>
      <div style="margin-bottom:1.2rem">
        <div
          style="font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem">
          Profils recherchés</div>
        <div id="modal-roles" style="display:flex;gap:0.4rem;flex-wrap:wrap"></div>
      </div>
      <div id="modal-github-wrap" style="margin-bottom:1.2rem;display:none">
        <div
          style="font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.3rem">
          GitHub</div>
        <a id="modal-github" href="#" target="_blank" style="color:var(--accent);font-size:0.9rem"></a>
      </div>
      <div
        style="display:flex;align-items:center;justify-content:space-between;padding-top:1rem;border-top:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.85rem;color:var(--muted)">
          <div class="avatar" id="modal-avatar" style="width:28px;height:28px;font-size:0.7rem"></div>
          <span id="modal-author"></span>
        </div>
        <button class="btn btn-success" id="btn-apply">✋ Postuler</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, query, orderBy, onSnapshot,
      doc, updateDoc, arrayUnion, getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBWqF4_uiur-XOD8lQy2X9cJciWo9vkUZg",
      authDomain: "stackmates-a674e.firebaseapp.com",
      projectId: "stackmates-a674e",
      storageBucket: "stackmates-a674e.firebasestorage.app",
      messagingSenderId: "485803590862",
      appId: "1:485803590862:web:875a4dda0c2c31605dbc9f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let allProjects = [];
    let currentProjectId = null;
    let selectedStack = 'all';
    let selectedStatus = 'all';
    let searchQuery = '';

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show ' + type;
      setTimeout(() => t.className = '', 3000);
    }

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        document.getElementById('nav-auth-li').style.display = 'none';
        document.getElementById('nav-profile-li').style.display = 'flex';
        document.getElementById('nav-logout-li').style.display = 'flex';
      }
    });

    document.getElementById('btn-logout').onclick = async (e) => {
      e.preventDefault();
      await signOut(auth);
      window.location.reload();
    };

    // Load projects realtime
    const q = query(collection(db, 'projects'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snap) => {
      allProjects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderProjects();
    });

    function statusBadge(status) {
      const map = {
        open: '<span class="badge badge-open">🟢 Ouvert</span>',
        inprogress: '<span class="badge badge-inprogress">🟡 En cours</span>',
        done: '<span class="badge badge-done">⚫ Terminé</span>'
      };
      return map[status] || map.open;
    }

    function initials(name) {
      return (name || '?').slice(0, 2).toUpperCase();
    }

    function renderProjects() {
      let filtered = allProjects.filter(p => {
        const matchStack = selectedStack === 'all' || (p.stack || []).includes(selectedStack);
        const matchStatus = selectedStatus === 'all' || p.status === selectedStatus;
        const q = searchQuery.toLowerCase();
        const matchSearch = !q || p.title?.toLowerCase().includes(q) || p.description?.toLowerCase().includes(q) || (p.stack || []).join(' ').toLowerCase().includes(q);
        return matchStack && matchStatus && matchSearch;
      });

      const grid = document.getElementById('projects-grid');
      if (!filtered.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="icon">🔍</div>
        <h3>Aucun projet trouvé</h3>
        <p>Essaie d'autres filtres ou crée le tien !</p>
      </div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => `
      <div class="card project-card" onclick="openModal('${p.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem">
          <h3>${p.title || 'Sans titre'}</h3>
          ${statusBadge(p.status)}
        </div>
        <p class="desc">${p.description || ''}</p>
        <div class="project-meta">
          ${(p.stack || []).slice(0, 4).map(s => `<span class="badge badge-stack">${s}</span>`).join('')}
        </div>
        <div class="roles-needed">
          ${(p.rolesNeeded || []).map(r => `<span class="badge badge-role">${r}</span>`).join('')}
        </div>
        <div class="project-footer">
          <div class="author">
            <div class="avatar" style="width:24px;height:24px;font-size:0.65rem">${initials(p.authorName)}</div>
            ${p.authorName || 'Anonyme'}
          </div>
          <span style="font-size:0.8rem;color:var(--muted)">${(p.applicants || []).length} candidat(s)</span>
        </div>
      </div>
    `).join('');
    }

    // Filters
    document.querySelectorAll('#stack-filters .filter-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('#stack-filters .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedStack = btn.dataset.stack;
        renderProjects();
      };
    });

    document.querySelectorAll('#status-filters .filter-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('#status-filters .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedStatus = btn.dataset.status;
        renderProjects();
      };
    });

    document.getElementById('search').oninput = (e) => {
      searchQuery = e.target.value;
      renderProjects();
    };

    // Modal
    window.openModal = async (id) => {
      const p = allProjects.find(x => x.id === id);
      if (!p) return;
      currentProjectId = id;
      document.getElementById('modal-title').textContent = p.title || '';
      document.getElementById('modal-desc').textContent = p.description || '';
      document.getElementById('modal-badges').innerHTML = statusBadge(p.status);
      document.getElementById('modal-stack').innerHTML = (p.stack || []).map(s => `<span class="badge badge-stack">${s}</span>`).join('');
      document.getElementById('modal-roles').innerHTML = (p.rolesNeeded || []).map(r => `<span class="badge badge-role">${r}</span>`).join('');
      document.getElementById('modal-author').textContent = p.authorName || 'Anonyme';
      document.getElementById('modal-avatar').textContent = initials(p.authorName);
      const ghWrap = document.getElementById('modal-github-wrap');
      if (p.github) {
        ghWrap.style.display = 'block';
        const ghA = document.getElementById('modal-github');
        ghA.href = p.github;
        ghA.textContent = p.github;
      } else {
        ghWrap.style.display = 'none';
      }
      const btnApply = document.getElementById('btn-apply');
      if (p.status !== 'open') {
        btnApply.style.display = 'none';
      } else if (currentUser && p.authorUid === currentUser.uid) {
        btnApply.textContent = '👑 Ton projet';
        btnApply.disabled = true;
      } else if (currentUser && (p.applicants || []).includes(currentUser.uid)) {
        btnApply.textContent = '✅ Candidature envoyée';
        btnApply.disabled = true;
      } else {
        btnApply.textContent = '✋ Postuler';
        btnApply.disabled = false;
      }
      document.getElementById('project-modal').classList.add('open');
    };

    window.closeModal = () => {
      document.getElementById('project-modal').classList.remove('open');
      currentProjectId = null;
    };

    document.getElementById('project-modal').onclick = (e) => {
      if (e.target === e.currentTarget) closeModal();
    };

    document.getElementById('btn-apply').onclick = async () => {
      if (!currentUser) return (window.location.href = 'auth.html');
      if (!currentProjectId) return;
      try {
        await updateDoc(doc(db, 'projects', currentProjectId), {
          applicants: arrayUnion(currentUser.uid)
        });
        showToast('Candidature envoyée ! 🎉', 'success');
        document.getElementById('btn-apply').textContent = '✅ Candidature envoyée';
        document.getElementById('btn-apply').disabled = true;
      } catch (e) { showToast('Erreur : ' + e.message, 'error'); }
    };
  </script>

</body>

</html>
