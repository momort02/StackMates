<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#151820"/>
      <stop offset="100%" style="stop-color:#1c2030"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="#2a2f42" stroke-width="1"/>

  <!-- Connection lines -->
  <line x1="18" y1="18" x2="46" y2="18" stroke="url(#g1)" stroke-width="1.5" stroke-opacity="0.45"/>
  <line x1="18" y1="18" x2="18" y2="46" stroke="#6c63ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="46" y1="18" x2="46" y2="46" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="18" y1="46" x2="46" y2="46" stroke="url(#g1)" stroke-width="1.5" stroke-opacity="0.45"/>
  <line x1="18" y1="18" x2="46" y2="46" stroke="#6c63ff" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="46" y1="18" x2="18" y2="46" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.18"/>

  <!-- Center node -->
  <circle cx="32" cy="32" r="3" fill="url(#g1)" opacity="0.65"/>

  <!-- Node A - top left -->
  <circle cx="18" cy="18" r="5" fill="#6c63ff" filter="url(#glow)"/>
  <circle cx="18" cy="18" r="2.5" fill="#e8eaf0"/>

  <!-- Node B - top right -->
  <circle cx="46" cy="18" r="4" fill="#a78bfa" filter="url(#glow)"/>
  <circle cx="46" cy="18" r="2" fill="#e8eaf0"/>

  <!-- Node C - bottom left -->
  <circle cx="18" cy="46" r="4" fill="#ff6b6b" filter="url(#glow)"/>
  <circle cx="18" cy="46" r="2" fill="#e8eaf0"/>

  <!-- Node D - bottom right -->
  <circle cx="46" cy="46" r="5" fill="#3ecf8e" filter="url(#glow)"/>
  <circle cx="46" cy="46" r="2.5" fill="#e8eaf0"/>

</svg>
