<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackMates | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>StackMates</span>
            </div>
            <nav>
                <button class="nav-item active" id="navProjects">📊 Dashboard</button>
                <button class="nav-item" id="navMyProjects">📁 Mes Projets</button>
                <button class="nav-item" id="navMessages">💬 Messages</button>
                <div class="nav-divider"></div>
                <button class="nav-item" id="navSettings">⚙️ Paramètres</button>
            </nav>
            <div class="user-profile">
                <div class="avatar" id="userAvatar">?</div>
                <div class="user-info">
                    <p id="userName">Utilisateur</p>
                    <button id="logout">Déconnexion</button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2 id="view-title">Dashboard</h2>
                <div class="search-wrapper">
                    <input type="text" id="search" placeholder="Rechercher...">
                </div>
                <button class="btn-primary" id="openModal">+ Nouveau Projet</button>
            </header>

            <div id="view-container" class="scroll-area">

                <section id="view-dashboard" class="view">
                    <div class="stats-grid">
                        <div class="stat-card"><span>Total Projets</span>
                            <h3 id="statTotal">0</h3>
                        </div>
                        <div class="stat-card"><span>Mes Projets</span>
                            <h3 id="statMine">0</h3>
                        </div>
                        <div class="stat-card"><span>Messages</span>
                            <h3 id="statMsgs">0</h3>
                        </div>
                    </div>
                    <div id="projects" class="projects-grid"></div>
                </section>

                <section id="view-my-projects" class="view" style="display:none;">
                    <div class="section-header">
                        <h2>Gérer mes annonces</h2>
                    </div>
                    <div id="my-projects-list" class="projects-grid"></div>
                </section>

                <section id="view-messages" class="view" style="display:none;">
                    <div class="messages-layout">
                        <div class="conversations-list" id="conv-list">
                            <p class="empty-hint">Aucune conversation pour le moment.</p>
                        </div>
                        <div class="chat-window">
                            <p class="empty-hint">Sélectionnez une discussion</p>
                        </div>
                    </div>
                </section>

                <section id="view-settings" class="view" style="display:none;">
                    <div class="settings-card">
                        <h3>Mon Profil</h3>
                        <div class="input-group">
                            <label>Nom d'affichage</label>
                            <input type="text" id="settings-name">
                        </div>
                        <button class="btn-primary">Enregistrer les modifications</button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="createModal" class="modal">
        <div class="modal-content">
            <h3>Créer un nouveau projet</h3>
            <input id="title" placeholder="Nom du projet">
            <textarea id="description" placeholder="Description détaillée..."></textarea>
            <input id="stack" placeholder="Stack technique (ex: React, Firebase)">
            <div class="modal-actions">
                <button class="btn-secondary" id="closeModal">Annuler</button>
                <button class="btn-primary" id="createProject">Publier</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
