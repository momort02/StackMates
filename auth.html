<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackMates | Connexion</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="auth-page">

    <div class="auth-container">
        <div class="auth-visual">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>StackMates</span>
            </div>
            <h1>Construisez le futur, <br><span>ensemble.</span></h1>
            <p>Rejoignez la plus grande communauté de développeurs passionnés.</p>
        </div>

        <div class="auth-form-box">
            <div class="form-header">
                <h2 id="authTitle">Bon retour !</h2>
                <p id="authSubTitle">Connectez-vous pour accéder à votre dashboard.</p>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="nom@exemple.com">
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="btn-primary full-width" id="authBtn">Se connecter</button>

            <p class="auth-toggle">
                Pas encore de compte ? <span id="toggleAuth">S'inscrire</span>
            </p>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>

</html>
