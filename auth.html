<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StackMates — Connexion</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        .auth-page {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }

        .auth-box h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
        }

        .auth-box .subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1.8rem;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 3px;
        }

        .auth-tab {
            flex: 1;
            padding: 0.5rem;
            text-align: center;
            border-radius: calc(var(--radius-sm) - 2px);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--muted);
            border: none;
            background: transparent;
            font-family: 'DM Sans', sans-serif;
        }

        .auth-tab.active {
            background: var(--accent);
            color: #fff;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0;
            color: var(--muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .btn-google {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.7rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: border-color 0.2s;
            margin-bottom: 0.5rem;
        }

        .btn-google:hover {
            border-color: var(--accent);
        }

        .btn-google img {
            width: 18px;
            height: 18px;
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: #5a52e0;
        }

        #register-form {
            display: none;
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="nav-logo">Stack<span>Mates</span></a>
        <ul class="nav-links">
            <li><a href="projects.html">Projets</a></li>
        </ul>
    </nav>

    <div class="auth-page">
        <div class="auth-box">
            <h2>Bienvenue 👋</h2>
            <p class="subtitle">Connecte-toi pour accéder à StackMates.</p>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Connexion</button>
                <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Inscription</button>
            </div>

            <button class="btn-google" id="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
                Continuer avec Google
            </button>

            <div class="divider">ou</div>

            <!-- LOGIN FORM -->
            <div id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="toi@example.com" />
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="login-password" placeholder="••••••••" />
                </div>
                <button class="btn-submit" id="btn-login">Se connecter</button>
            </div>

            <!-- REGISTER FORM -->
            <div id="register-form">
                <div class="form-group">
                    <label>Pseudo</label>
                    <input type="text" id="reg-username" placeholder="ton_pseudo" />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="toi@example.com" />
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="reg-password" placeholder="••••••••" />
                </div>
                <button class="btn-submit" id="btn-register">Créer mon compte</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import {
            getAuth, signInWithEmailAndPassword,
            createUserWithEmailAndPassword, GoogleAuthProvider,
            signInWithPopup, updateProfile, onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWqF4_uiur-XOD8lQy2X9cJciWo9vkUZg",
            authDomain: "stackmates-a674e.firebaseapp.com",
            projectId: "stackmates-a674e",
            storageBucket: "stackmates-a674e.firebasestorage.app",
            messagingSenderId: "485803590862",
            appId: "1:485803590862:web:875a4dda0c2c31605dbc9f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'projects.html';
        });

        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'show ' + type;
            setTimeout(() => t.className = '', 3000);
        }

        async function createUserDoc(user, username) {
            const ref = doc(db, 'users', user.uid);
            const snap = await getDoc(ref);
            if (!snap.exists()) {
                await setDoc(ref, {
                    uid: user.uid,
                    username: username || user.displayName || user.email.split('@')[0],
                    email: user.email,
                    bio: '',
                    stack: [],
                    github: '',
                    createdAt: serverTimestamp()
                });
            }
        }

        // Google
        document.getElementById('btn-google').onclick = async () => {
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                await createUserDoc(result.user, null);
                window.location.href = 'projects.html';
            } catch (e) { showToast('Erreur Google : ' + e.message, 'error'); }
        };

        // Login
        document.getElementById('btn-login').onclick = async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'projects.html';
            } catch (e) { showToast('Email ou mot de passe incorrect.', 'error'); }
        };

        // Register
        document.getElementById('btn-register').onclick = async () => {
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            if (!username) return showToast('Renseigne un pseudo.', 'error');
            try {
                const result = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(result.user, { displayName: username });
                await createUserDoc(result.user, username);
                window.location.href = 'profile.html';
            } catch (e) { showToast('Erreur : ' + e.message, 'error'); }
        };
    </script>

    <script>
        function switchTab(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        }
    </script>

</body>

</html>
