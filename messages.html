<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StackMates — Messages</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { overflow: hidden; }

    .messages-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 64px);
    }

    /* SIDEBAR CONVERSATIONS */
    .convos-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }

    .convos-header {
      padding: 1.2rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .convos-header h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
    }

    .unread-total {
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.1rem 0.5rem;
      display: none;
    }

    .convos-search {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .convos-search input {
      padding: 0.5rem 0.8rem;
      font-size: 0.85rem;
    }

    .convos-list {
      overflow-y: auto;
      flex: 1;
    }

    .convo-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.9rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(42,47,66,0.5);
      transition: background 0.15s;
      position: relative;
    }

    .convo-item:hover { background: var(--surface2); }
    .convo-item.active { background: rgba(108,99,255,0.1); border-left: 2px solid var(--accent); }

    .convo-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      flex-shrink: 0; overflow: hidden;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; color: #fff;
    }

    .convo-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .convo-info { flex: 1; min-width: 0; }

    .convo-name {
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .convo-preview {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.1rem;
    }

    .convo-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .convo-time { font-size: 0.72rem; color: var(--muted); }

    .unread-badge {
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.1rem 0.45rem;
      min-width: 18px;
      text-align: center;
    }

    /* CHAT PANEL */
    .chat-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 1rem;
    }

    .chat-empty .icon { font-size: 3rem; }

    .chat-empty h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
    }

    .chat-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex-shrink: 0;
      background: var(--surface);
    }

    .chat-header-info { flex: 1; }
    .chat-header-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
    .chat-header-sub { font-size: 0.78rem; color: var(--muted); }

    .chat-header-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem; color: #fff;
    }

    .chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    /* Messages */
    .msg-group { display: flex; flex-direction: column; gap: 0.25rem; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 0.6rem;
    }

    .msg-row.mine { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 700; color: #fff;
    }

    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-avatar.hidden { visibility: hidden; }

    .msg-bubble {
      max-width: 65%;
      padding: 0.6rem 1rem;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg-row.mine .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-row:not(.mine) .msg-bubble {
      background: var(--surface2);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 0.68rem;
      color: var(--muted);
      padding: 0 0.5rem;
      margin-top: 0.1rem;
      text-align: right;
    }

    .msg-row:not(.mine) .msg-time { text-align: left; }

    .msg-date-sep {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0.5rem 0;
      position: relative;
    }

    .msg-date-sep::before, .msg-date-sep::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--border);
    }

    .msg-date-sep::before { left: 0; }
    .msg-date-sep::after { right: 0; }

    /* Input area */
    .chat-input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 0.7rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .chat-input-wrap { flex: 1; position: relative; }

    #chat-input {
      resize: none;
      min-height: 44px;
      max-height: 120px;
      padding: 0.65rem 1rem;
      border-radius: 22px;
      font-size: 0.92rem;
      line-height: 1.4;
      overflow-y: auto;
    }

    .btn-send {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.18s, transform 0.1s;
    }

    .btn-send:hover { background: #5a52e0; }
    .btn-send:active { transform: scale(0.92); }
    .btn-send:disabled { background: var(--border); cursor: not-allowed; }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .typing-dots { display: flex; gap: 3px; }

    .typing-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: typing 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* New convo modal */
    .user-search-results { max-height: 220px; overflow-y: auto; margin-top: 0.5rem; }

    .user-result-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.6rem 0.8rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
    }

    .user-result-item:hover { background: var(--surface2); }

    .user-result-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }

    .user-result-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .user-result-info .name { font-weight: 600; font-size: 0.9rem; }
    .user-result-info .stack { font-size: 0.75rem; color: var(--muted); }

    @media (max-width: 768px) {
      .messages-layout { grid-template-columns: 1fr; }
      .convos-panel { display: none; }
      .convos-panel.mobile-open { display: flex; position: fixed; inset: 64px 0 0 0; z-index: 50; }
    }
  </style>

<style>
#site-banner{display:none;background:var(--accent);color:#fff;text-align:center;padding:0.55rem 1rem;font-size:0.88rem;font-weight:500;position:sticky;top:64px;z-index:99}
</style>
</head>
<body>
<div id="site-banner"></div>

<nav>
  <a href="index.html" class="nav-logo">Stack<span>Mates</span></a>
  <ul class="nav-links">
    <li><a href="projects.html">Projets</a></li>
    <li><a href="messages.html" class="active">Messages <span class="unread-total" id="nav-unread"></span></a></li>
    <li><a href="profile.html">Mon profil</a></li>
    <li><a href="#" id="btn-logout">Déconnexion</a></li>
  </ul>
</nav>

<div class="messages-layout">

  <!-- PANEL GAUCHE : conversations -->
  <div class="convos-panel" id="convos-panel">
    <div class="convos-header">
      <h2>💬 Messages <span class="unread-total" id="total-unread"></span></h2>
      <button class="btn btn-primary" style="padding:0.35rem 0.8rem;font-size:0.82rem" onclick="openNewConvo()">+ Nouveau</button>
    </div>
    <div class="convos-search">
      <input type="text" id="search-convos" placeholder="🔍 Rechercher une conversation..." />
    </div>
    <div class="convos-list" id="convos-list">
      <div style="padding:2rem;text-align:center;color:var(--muted);font-size:0.9rem">Chargement...</div>
    </div>
  </div>

  <!-- PANEL DROIT : chat -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-empty" id="chat-empty">
      <div class="icon">💬</div>
      <h3>Sélectionne une conversation</h3>
      <p style="font-size:0.9rem;color:var(--muted)">Ou démarre une nouvelle conversation avec un dev.</p>
      <button class="btn btn-primary" onclick="openNewConvo()">Nouveau message</button>
    </div>

    <!-- Active chat (hidden until selected) -->
    <div id="chat-active" style="display:none;flex-direction:column;height:100%">
      <div class="chat-header">
        <div class="chat-header-avatar" id="ch-avatar"></div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="ch-name">—</div>
          <div class="chat-header-sub" id="ch-sub">—</div>
        </div>
        <a id="ch-profile-link" href="#" style="color:var(--muted);font-size:0.82rem;text-decoration:none">Voir profil →</a>
      </div>

      <div class="chat-messages" id="chat-messages"></div>

      <div style="padding:0 1.5rem 0.2rem;display:flex;align-items:center;gap:0.5rem" id="typing-row">
        <div class="typing-indicator" id="typing-indicator">
          <div class="typing-dots"><span></span><span></span><span></span></div>
          <span id="typing-name"></span> écrit...
        </div>
      </div>

      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea id="chat-input" placeholder="Écris un message..." rows="1"></textarea>
        </div>
        <button class="btn-send" id="btn-send" disabled>➤</button>
      </div>
    </div>
  </div>

</div>

<!-- Modal nouvelle conversation -->
<div class="modal-overlay" id="new-convo-modal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <h2>Nouveau message</h2>
      <button onclick="closeNewConvo()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem">✕</button>
    </div>
    <div class="form-group">
      <label>Rechercher un utilisateur</label>
      <input type="text" id="search-user" placeholder="Pseudo ou email..." />
    </div>
    <div class="user-search-results" id="user-search-results"></div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc, updateDoc, addDoc,
    collection, query, where, orderBy, onSnapshot,
    serverTimestamp, getDocs, limit, arrayUnion, increment
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBWqF4_uiur-XOD8lQy2X9cJciWo9vkUZg",
    authDomain: "stackmates-a674e.firebaseapp.com",
    projectId: "stackmates-a674e",
    storageBucket: "stackmates-a674e.firebasestorage.app",
    messagingSenderId: "485803590862",
    appId: "1:485803590862:web:875a4dda0c2c31605dbc9f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentUserData = null;
  let activeConvoId = null;
  let messagesUnsub = null;
  let convosUnsub = null;
  let typingTimeout = null;
  let allConvos = [];

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'show ' + type;
    setTimeout(() => t.className = '', 3000);
  }

  function initials(name) { return (name || '?').slice(0, 2).toUpperCase(); }

  function avatarEl(data, size = 42) {
    const el = document.createElement('div');
    el.className = 'convo-avatar';
    el.style.cssText = `width:${size}px;height:${size}px;font-size:${size * 0.2}rem`;
    if (data?.photoBase64) {
      el.innerHTML = `<img src="${data.photoBase64}" alt="" />`;
    } else {
      el.textContent = initials(data?.username);
    }
    return el;
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'maintenant';
    if (diff < 3600000) return `${Math.floor(diff / 60000)}min`;
    if (diff < 86400000) return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    if (diff < 604800000) return d.toLocaleDateString('fr-FR', { weekday: 'short' });
    return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
  }

  function formatFullTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }

  function formatDate(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) return "Aujourd'hui";
    const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
    if (d.toDateString() === yesterday.toDateString()) return 'Hier';
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  // CONVO ID = sorted UIDs joined
  function convoId(uid1, uid2) {
    return [uid1, uid2].sort().join('_');
  }

  document.getElementById('btn-logout').onclick = async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = 'index.html';
  };

  onAuthStateChanged(auth, async (user) => {
    if (!user) return (window.location.href = 'auth.html');
    currentUser = user;
    const udoc = await getDoc(doc(db, 'users', user.uid));
    currentUserData = udoc.exists() ? udoc.data() : {};
    loadConversations();
  });

  // ─── CONVERSATIONS LIST ───────────────────────────────────────────────────
  function loadConversations() {
    const q = query(
      collection(db, 'conversations'),
      where('members', 'array-contains', currentUser.uid),
      orderBy('lastMessageAt', 'desc')
    );
    convosUnsub = onSnapshot(q, async (snap) => {
      allConvos = await Promise.all(snap.docs.map(async (d) => {
        const data = { id: d.id, ...d.data() };
        const otherUid = data.members.find(m => m !== currentUser.uid);
        const otherDoc = await getDoc(doc(db, 'users', otherUid));
        data.otherUser = otherDoc.exists() ? otherDoc.data() : { username: 'Utilisateur', uid: otherUid };
        data.unread = data.unreadCounts?.[currentUser.uid] || 0;
        return data;
      }));
      renderConvos(allConvos);
      updateTotalUnread();
    });
  }

  function renderConvos(convos) {
    const list = document.getElementById('convos-list');
    const search = document.getElementById('search-convos').value.toLowerCase();
    const filtered = convos.filter(c =>
      !search || c.otherUser.username?.toLowerCase().includes(search)
    );
    if (!filtered.length) {
      list.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--muted);font-size:0.9rem">
        ${search ? 'Aucun résultat.' : 'Aucune conversation. Démarre-en une !'}
      </div>`;
      return;
    }
    list.innerHTML = '';
    filtered.forEach(c => {
      const item = document.createElement('div');
      item.className = 'convo-item' + (c.id === activeConvoId ? ' active' : '');
      item.dataset.id = c.id;

      const av = avatarEl(c.otherUser, 42);

      const preview = c.lastMessage
        ? (c.lastSenderUid === currentUser.uid ? 'Toi : ' : '') + c.lastMessage.slice(0, 40)
        : 'Démarrer la conversation';

      item.innerHTML = `
        <div class="convo-info">
          <div class="convo-name">${c.otherUser.username || 'Anonyme'}</div>
          <div class="convo-preview">${preview}</div>
        </div>
        <div class="convo-meta">
          <span class="convo-time">${formatTime(c.lastMessageAt)}</span>
          ${c.unread > 0 ? `<span class="unread-badge">${c.unread}</span>` : ''}
        </div>
      `;
      item.prepend(av);
      item.onclick = () => openConvo(c.id, c.otherUser);
      list.appendChild(item);
    });
  }

  function updateTotalUnread() {
    const total = allConvos.reduce((s, c) => s + (c.unread || 0), 0);
    const badges = [document.getElementById('total-unread'), document.getElementById('nav-unread')];
    badges.forEach(b => {
      if (!b) return;
      if (total > 0) { b.textContent = total; b.style.display = 'inline'; }
      else { b.style.display = 'none'; }
    });
  }

  document.getElementById('search-convos').oninput = () => renderConvos(allConvos);

  // ─── OPEN CONVERSATION ────────────────────────────────────────────────────
  window.openConvo = async (id, otherUser) => {
    if (messagesUnsub) messagesUnsub();
    activeConvoId = id;

    // Mark as read
    await updateDoc(doc(db, 'conversations', id), {
      [`unreadCounts.${currentUser.uid}`]: 0
    }).catch(() => {});

    // Update UI active state
    document.querySelectorAll('.convo-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === id);
    });

    // Chat header
    document.getElementById('chat-empty').style.display = 'none';
    const chatActive = document.getElementById('chat-active');
    chatActive.style.display = 'flex';

    const chAv = document.getElementById('ch-avatar');
    chAv.innerHTML = '';
    if (otherUser.photoBase64) {
      chAv.innerHTML = `<img src="${otherUser.photoBase64}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
    } else {
      chAv.textContent = initials(otherUser.username);
    }

    document.getElementById('ch-name').textContent = otherUser.username || 'Anonyme';
    document.getElementById('ch-sub').textContent = (otherUser.stack || []).slice(0, 3).join(' · ') || '';
    document.getElementById('ch-profile-link').href = `user-profile.html?uid=${otherUser.uid || ''}`;

    // Messages realtime
    const msgsQ = query(
      collection(db, 'conversations', id, 'messages'),
      orderBy('sentAt', 'asc')
    );

    messagesUnsub = onSnapshot(msgsQ, (snap) => {
      renderMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })), otherUser);
    });

    // Input
    const input = document.getElementById('chat-input');
    const btnSend = document.getElementById('btn-send');
    input.value = '';
    btnSend.disabled = true;
    input.focus();

    input.oninput = () => {
      btnSend.disabled = !input.value.trim();
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    };

    input.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!btnSend.disabled) sendMessage();
      }
    };

    btnSend.onclick = sendMessage;
  };

  // ─── RENDER MESSAGES ──────────────────────────────────────────────────────
  function renderMessages(messages, otherUser) {
    const container = document.getElementById('chat-messages');
    const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;

    container.innerHTML = '';
    let lastDate = null;

    messages.forEach((msg, i) => {
      const isMine = msg.senderUid === currentUser.uid;
      const msgDate = msg.sentAt ? formatDate(msg.sentAt) : '';
      const nextMsg = messages[i + 1];
      const isLastInGroup = !nextMsg || nextMsg.senderUid !== msg.senderUid;

      if (msgDate !== lastDate) {
        const sep = document.createElement('div');
        sep.className = 'msg-date-sep';
        sep.textContent = msgDate;
        container.appendChild(sep);
        lastDate = msgDate;
      }

      const row = document.createElement('div');
      row.className = 'msg-row' + (isMine ? ' mine' : '');

      const av = document.createElement('div');
      av.className = 'msg-avatar' + (isLastInGroup ? '' : ' hidden');
      if (!isMine) {
        if (otherUser.photoBase64) {
          av.innerHTML = `<img src="${otherUser.photoBase64}" alt="" />`;
        } else {
          av.textContent = initials(otherUser.username);
        }
      }

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = msg.text;

      if (isLastInGroup) {
        const time = document.createElement('div');
        time.className = 'msg-time';
        time.textContent = formatFullTime(msg.sentAt);
        const wrap = document.createElement('div');
        wrap.style.cssText = 'display:flex;flex-direction:column;max-width:65%';
        wrap.appendChild(bubble);
        wrap.appendChild(time);
        if (!isMine) row.appendChild(av);
        row.appendChild(wrap);
        if (isMine) row.appendChild(av);
      } else {
        if (!isMine) row.appendChild(av);
        row.appendChild(bubble);
        if (isMine) row.appendChild(av);
      }

      container.appendChild(row);
    });

    if (wasAtBottom || messages.length < 3) {
      container.scrollTop = container.scrollHeight;
    }
  }

  // ─── SEND MESSAGE ─────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || !activeConvoId) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('btn-send').disabled = true;

    const convoRef = doc(db, 'conversations', activeConvoId);
    const convoDoc = await getDoc(convoRef);
    const otherUid = convoDoc.data().members.find(m => m !== currentUser.uid);

    await addDoc(collection(db, 'conversations', activeConvoId, 'messages'), {
      text,
      senderUid: currentUser.uid,
      senderName: currentUserData.username || currentUser.displayName,
      sentAt: serverTimestamp()
    });

    await updateDoc(convoRef, {
      lastMessage: text,
      lastMessageAt: serverTimestamp(),
      lastSenderUid: currentUser.uid,
      [`unreadCounts.${otherUid}`]: increment(1)
    });
  }

  // ─── NEW CONVERSATION ─────────────────────────────────────────────────────
  window.openNewConvo = () => {
    document.getElementById('new-convo-modal').classList.add('open');
    document.getElementById('search-user').focus();
  };

  window.closeNewConvo = () => {
    document.getElementById('new-convo-modal').classList.remove('open');
    document.getElementById('search-user').value = '';
    document.getElementById('user-search-results').innerHTML = '';
  };

  document.getElementById('new-convo-modal').onclick = (e) => {
    if (e.target === e.currentTarget) closeNewConvo();
  };

  let searchDebounce = null;
  document.getElementById('search-user').oninput = (e) => {
    clearTimeout(searchDebounce);
    const val = e.target.value.trim().toLowerCase();
    if (!val) { document.getElementById('user-search-results').innerHTML = ''; return; }
    searchDebounce = setTimeout(() => searchUsers(val), 300);
  };

  async function searchUsers(query) {
    const resultsEl = document.getElementById('user-search-results');
    resultsEl.innerHTML = '<div style="padding:0.5rem;color:var(--muted);font-size:0.85rem">Recherche...</div>';

    const snap = await getDocs(collection(db, 'users'));
    const users = snap.docs
      .map(d => d.data())
      .filter(u => u.uid !== currentUser.uid)
      .filter(u =>
        u.username?.toLowerCase().includes(query) ||
        u.email?.toLowerCase().includes(query)
      )
      .slice(0, 8);

    if (!users.length) {
      resultsEl.innerHTML = '<div style="padding:0.8rem;color:var(--muted);font-size:0.85rem">Aucun utilisateur trouvé.</div>';
      return;
    }

    resultsEl.innerHTML = '';
    users.forEach(u => {
      const item = document.createElement('div');
      item.className = 'user-result-item';

      const av = document.createElement('div');
      av.className = 'user-result-avatar';
      if (u.photoBase64) {
        av.innerHTML = `<img src="${u.photoBase64}" alt="" />`;
      } else {
        av.textContent = initials(u.username);
      }

      item.innerHTML = `
        <div class="user-result-info">
          <div class="name">${u.username || 'Anonyme'}</div>
          <div class="stack">${(u.stack || []).slice(0, 3).join(' · ') || u.email}</div>
        </div>
      `;
      item.prepend(av);
      item.onclick = () => startConvoWith(u);
      resultsEl.appendChild(item);
    });
  }

  async function startConvoWith(otherUser) {
    closeNewConvo();
    const id = convoId(currentUser.uid, otherUser.uid);
    const convoRef = doc(db, 'conversations', id);
    const snap = await getDoc(convoRef);
    if (!snap.exists()) {
      await setDoc(convoRef, {
        members: [currentUser.uid, otherUser.uid],
        lastMessage: '',
        lastMessageAt: serverTimestamp(),
        lastSenderUid: null,
        unreadCounts: { [currentUser.uid]: 0, [otherUser.uid]: 0 },
        createdAt: serverTimestamp()
      });
    }
    openConvo(id, otherUser);
  }

  // ─── OPEN FROM URL PARAM ──────────────────────────────────────────────────
  const urlParams = new URLSearchParams(window.location.search);
  const startWithUid = urlParams.get('with');
  if (startWithUid) {
    onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      const otherDoc = await getDoc(doc(db, 'users', startWithUid));
      if (otherDoc.exists()) startConvoWith(otherDoc.data());
    });
  }
</script>
